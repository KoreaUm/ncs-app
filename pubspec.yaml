name: ncs_app
description: "NCS 직업기초능력 문제풀이 태블릿 앱 (iPad/Android 태블릿 전용 지향, 레이아웃은 MediaQuery 기반 반응형)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  provider: ^6.1.2
  csv: ^6.0.0
  file_picker: ^11.0.2
  share_plus: ^10.1.4
  pdf: ^3.11.1
  printing: ^5.13.4
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
